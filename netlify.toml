# Netlify deploy config for Q3 2026 Events site.
# Static site, no build step. Publish root.

[build]
  publish = "."
  command = ""

# ----- Cache headers -----
# news.json: must NEVER be cached, otherwise daily 8:00 update won't show up.
[[headers]]
  for = "/news.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# index.html: short cache, so users see new layout on next visit.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Catch-all root: same as index.html
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Event JSON files: medium cache (rebuilt occasionally).
[[headers]]
  for = "/fetcher/events_*.json"
  [headers.values]
    Cache-Control = "public, max-age=600, must-revalidate"
